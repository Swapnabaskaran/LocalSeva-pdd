name: Enterprise Load Testing Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  load-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup K6
      uses: grafana/setup-k6-action@v1
      with:
        k6-version: '0.47.0'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: pip install openpyxl pandas

    - name: Run K6 Load Test (Dry Run Simulation)
      continue-on-error: true
      run: |
        k6 run testing/load_testing/k6_localseva_load.js || true

    - name: Synthesize Enterprise Load Testing Excel Report
      run: |
        cd testing/load_testing
        python generate_load_report.py

    - name: Upload Enterprise Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Enterprise-Load-Testing-Reports
        path: |
          testing/load_testing/reports/Load_Testing_Report.xlsx

    - name: Commit and Push Reports to Repo
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add testing/load_testing/reports/* || true
        git commit -m "docs: Auto-update Load Testing Excel Reports from Load Suite" || true
        git push || true
