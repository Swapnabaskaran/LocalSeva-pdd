name: Smart Budget v3 Automated Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Dependencies
      run: |
        cd smart-budget-tests
        npm install

    - name: Run Selenium Web Tests
      run: |
        cd smart-budget-tests
        npx mocha tests/selenium/selenium.test.js --reporter mochawesome --reporter-options reportDir=reports/html,reportFilename=selenium_html_report || true

    - name: Run Appium Mobile Tests
      run: |
        cd smart-budget-tests
        npx mocha tests/appium/appium.test.js --reporter mochawesome --reporter-options reportDir=reports/html,reportFilename=appium_html_report || true

    - name: Run Security/Vulnerability Tests
      run: |
        cd smart-budget-tests
        npx mocha tests/security/security.test.js --reporter mochawesome --reporter-options reportDir=reports/html,reportFilename=security_html_report || true

    - name: Generate Excel Reports
      run: |
        cd smart-budget-tests
        node utils/generateReports.js

    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: smart-budget-test-reports
        path: |
          smart-budget-tests/reports/
