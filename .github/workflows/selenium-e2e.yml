name: Selenium E2E Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Generate Beautiful Enterprise Report
      run: |
        pip install openpyxl pandas
        cd testing/selenium
        python generate_enterprise_report.py
        
    - name: Upload Report Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          testing/selenium/reports/
          testing/selenium/screenshots/
          testing/selenium/logs/
