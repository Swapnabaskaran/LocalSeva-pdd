name: Baseline Load Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup k6
      uses: grafana/setup-k6-action@v1

    - name: Run k6 Baseline Test
      continue-on-error: true
      run: |
        k6 run testing/performance/baseline_test.js

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl

    - name: Generate Excel Report
      run: |
        python testing/performance/generate_excel.py

    - name: Upload Load Testing Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Load_Testing_Report
        path: |
          reports/Load_Testing_Report.xlsx
          reports/k6_summary.json
        retention-days: 14
