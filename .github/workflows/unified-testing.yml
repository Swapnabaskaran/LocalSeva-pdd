name: LocalSeva Unified Testing Framework

on:
  push:
    branches: [ "main", "testing-automation" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unified-testing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Setup Python (for Selenium & Security)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Create Reports Directories
        run: |
          mkdir -p testing/reports/excel
          mkdir -p testing/reports/html
          mkdir -p testing/reports/screenshots

      - name: Install Python Dependencies
        run: |
          cd testing
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Selenium E2E Tests
        continue-on-error: true
        run: |
          cd testing/selenium
          python -m pytest tests/test_web.py --html=../reports/html/Selenium_Report.html || true

      - name: Run Security Tests
        continue-on-error: true
        run: |
          cd testing/security
          python -m pytest api_tests/test_security.py --html=../reports/html/Security_Report.html || true

      - name: Install Appium Dependencies
        run: |
          cd testing/appium
          npm ci || npm install
          
      - name: Run Appium Mobile Tests
        continue-on-error: true
        run: |
          cd testing/appium
          npm run test || true
          
      - name: Move Appium Excel Report to Unified Folder
        continue-on-error: true
        run: |
          # Copy from appium reports folder to unified reports folder
          cp testing/appium/reports/Appium_Report.xlsx testing/reports/excel/ || true

      - name: Generate Master Report
        run: |
          cd testing
          export PYTHONPATH=$(pwd)
          python common/excel/master_report.py
          
      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localseva-unified-reports
          path: testing/reports/
          retention-days: 14
