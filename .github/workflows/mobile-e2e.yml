name: Mobile E2E Tests (Python/Appium)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  appium-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Appium Dependencies
      run: |
        cd testing/appium_python
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Appium Tests
      continue-on-error: true
      run: |
        cd testing/appium_python
        pytest tests/ -v --html=reports/report.html

    - name: Upload Test Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Appium_Mobile_E2E_Report
        path: |
          testing/appium_python/reports/Mobile_E2E_Report.xlsx
          testing/appium_python/reports/screenshots/
          testing/appium_python/reports/logs/
          testing/appium_python/reports/report.html
        retention-days: 14
