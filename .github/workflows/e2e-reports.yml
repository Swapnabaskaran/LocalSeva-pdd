name: E2E Test Report Generation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  generate-e2e-report:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: mobile-e2e-framework

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-e2e-framework/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run E2E Tests (Mock Driver)
      # We use test:mock for faster CI runs without booting a full Android emulator
      run: npm run test:mock
      # Continue on error so we still generate the report even if some tests fail
      continue-on-error: true

    - name: Generate HTML Report
      run: npm run report

    - name: Upload Mochawesome Report
      uses: actions/upload-artifact@v4
      with:
        name: mochawesome-html-report
        path: mobile-e2e-framework/mochawesome-report/html/
        retention-days: 14
